<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High Five an AI!</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --border: #2a2a4a;
      --text: #e8e8f0;
      --muted: #8888aa;
      --accent: #fbbf24;
      --glow: rgba(251, 191, 36, .35);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 1rem;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fbbf24, #f97316, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--muted);
      margin-top: .5rem;
      font-size: 1.05rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.25rem;
      max-width: 820px;
      width: 100%;
      padding: 2rem 1.25rem 3rem;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 2rem 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .75rem;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px var(--glow);
    }
    .card:active { transform: scale(.96); }

    .card .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .card .name {
      font-weight: 600;
      font-size: 1.05rem;
      text-align: center;
    }

    .card .count {
      font-size: .85rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    .card .hand {
      position: absolute;
      font-size: 2.8rem;
      pointer-events: none;
      opacity: 0;
      z-index: 10;
    }

    /* Color themes per AI */
    .card[data-ai="cursor"]  .icon { background: linear-gradient(135deg, #00b4d8, #7209b7); }
    .card[data-ai="claude"]  .icon { background: linear-gradient(135deg, #d4a27f, #c1694f); }
    .card[data-ai="chatgpt"] .icon { background: linear-gradient(135deg, #10a37f, #1a7f5a); }
    .card[data-ai="gemini"]  .icon { background: linear-gradient(135deg, #4285f4, #ea4335); }
    .card[data-ai="copilot"] .icon { background: linear-gradient(135deg, #6e40c9, #1f6feb); }
    .card[data-ai="grok"]    .icon { background: linear-gradient(135deg, #1d9bf0, #0d47a1); }
    .card[data-ai="perplexity"] .icon { background: linear-gradient(135deg, #20b2aa, #4169e1); }

    /* High-five animation */
    @keyframes slap-in {
      0%   { opacity: 0; transform: translate(-50%, 20px) rotate(-30deg) scale(.5); }
      40%  { opacity: 1; transform: translate(-50%, -10px) rotate(8deg) scale(1.3); }
      60%  { transform: translate(-50%, -6px) rotate(-4deg) scale(1.1); }
      100% { opacity: 0; transform: translate(-50%, -60px) rotate(0deg) scale(.8); }
    }

    .card .hand.animating {
      animation: slap-in .65s ease-out forwards;
    }

    /* Burst particles */
    @keyframes burst {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
    }
    .particle {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      pointer-events: none;
      animation: burst .55s ease-out forwards;
      z-index: 5;
    }

    /* Scoreboard */
    .scoreboard {
      text-align: center;
      padding: 0 1rem 3rem;
      color: var(--muted);
      font-size: .95rem;
    }
    .scoreboard strong {
      color: var(--accent);
      font-size: 1.3rem;
    }

    footer {
      margin-top: auto;
      padding: 2rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>High Five an AI!</h1>
  <p>Pick your favorite and slap some digital skin.</p>
</header>

<div class="grid" id="grid"></div>

<div class="scoreboard">
  Total high fives given: <strong id="total">0</strong>
</div>

<footer>
  Made with fun by a human + <a href="https://cursor.com" target="_blank">Cursor</a>
</footer>

<script>
const AIS = [
  { id: "cursor",     name: "Cursor",      letter: "C",  emoji: "✦" },
  { id: "claude",     name: "Claude",      letter: "C",  emoji: "🟠" },
  { id: "chatgpt",    name: "ChatGPT",     letter: "G",  emoji: "✳" },
  { id: "gemini",     name: "Gemini",      letter: "G",  emoji: "✦" },
  { id: "copilot",    name: "Copilot",     letter: "Co", emoji: "🔮" },
  { id: "grok",       name: "Grok",        letter: "X",  emoji: "𝕏" },
  { id: "perplexity", name: "Perplexity",  letter: "P",  emoji: "🔍" },
];

const PARTICLE_COLORS = ["#fbbf24","#f97316","#ec4899","#a855f7","#38bdf8","#34d399"];
const STORAGE_KEY = "highfive_counts";

function loadCounts() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveCounts(c) { localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); }

const counts = loadCounts();
const grid = document.getElementById("grid");
const totalEl = document.getElementById("total");

function updateTotal() {
  totalEl.textContent = Object.values(counts).reduce((a, b) => a + b, 0);
}

AIS.forEach(ai => {
  if (!counts[ai.id]) counts[ai.id] = 0;

  const card = document.createElement("div");
  card.className = "card";
  card.dataset.ai = ai.id;
  card.innerHTML = `
    <div class="icon">${ai.letter}</div>
    <div class="name">${ai.name}</div>
    <div class="count">${counts[ai.id] ? counts[ai.id] + " ✋" : ""}</div>
    <div class="hand">🤚</div>
  `;

  card.addEventListener("click", () => highFive(card, ai));
  grid.appendChild(card);
});

updateTotal();

function highFive(card, ai) {
  counts[ai.id]++;
  saveCounts(counts);

  const countEl = card.querySelector(".count");
  countEl.textContent = counts[ai.id] + " ✋";
  updateTotal();

  // Hand animation
  const hand = card.querySelector(".hand");
  hand.classList.remove("animating");
  void hand.offsetWidth;
  hand.style.left = "50%";
  hand.style.top = "30%";
  hand.classList.add("animating");

  // Particles
  spawnParticles(card);

  hand.addEventListener("animationend", () => {
    hand.classList.remove("animating");
  }, { once: true });
}

function spawnParticles(card) {
  const rect = card.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height * 0.35;

  for (let i = 0; i < 10; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const angle = (Math.PI * 2 * i) / 10 + (Math.random() - .5) * .5;
    const dist = 30 + Math.random() * 40;
    p.style.left = cx + "px";
    p.style.top = cy + "px";
    p.style.setProperty("--tx", Math.cos(angle) * dist + "px");
    p.style.setProperty("--ty", Math.sin(angle) * dist + "px");
    p.style.background = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
    card.appendChild(p);
    p.addEventListener("animationend", () => p.remove());
  }
}
</script>

</body>
</html>
